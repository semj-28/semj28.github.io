<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>semj28 | Connect</title>
    
    <!-- Google Tag Gateway Proxy -->
    <script async src="/metrics/gtag/js?id=G-XXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXX', {
        'transport_url': '/metrics',
        'first_party_collection': true
      });
    </script>

    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --linkedin: #0077b5;
            --bg-dark: #0f172a;
            --mouse-x: 50%;
            --mouse-y: 50%;
        }

        html {
            background-color: var(--bg-dark);
            height: 100%;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Interactive Glow Background */
            background: 
                radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            background-attachment: fixed;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            margin: 40px 0;
            z-index: 10;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        h1 { margin: 0 0 8px; font-size: 1.8rem; font-weight: 700; letter-spacing: -0.5px; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 0.95rem; }

        .form-group { text-align: left; margin-bottom: 18px; }
        label { display: block; font-size: 0.75rem; color: #64748b; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; }

        input, textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(0,0,0,0.5);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -6px var(--primary); }

        .btn-linkedin {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 100px;
            text-decoration: none;
            color: #e2e8f0;
            font-size: 0.85rem;
            transition: 0.3s;
        }

        .btn-linkedin:hover { background: var(--linkedin); border-color: var(--linkedin); color: white; }
        .linkedin-icon { width: 18px; height: 18px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="portrait.jpg" alt="semj28" class="profile-pic">
        <h1>Connect with Sem Janssens</h1>
        <p>Building the future on the edge. <br>Drop a message below.</p>

        <!-- Replace your-id-here with your actual Formspree ID -->
        <form action="https://formspree.io/f/your-id-here" method="POST">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="_replyto" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="3" placeholder="How can I help?" required></textarea>
            </div>
            <button type="submit" class="btn-submit">Send Message</button>
        </form>

        <a href="https://www.linkedin.com/in/sem-j/" target="_blank" class="btn-linkedin">
            <svg class="linkedin-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/>
            </svg>
            Connect on LinkedIn
        </a>
    </div>

    <script>
        // Smooth Mouse Follow Logic
        document.addEventListener('mousemove', e => {
            document.body.style.setProperty('--mouse-x', e.clientX + 'px');
            document.body.style.setProperty('--mouse-y', e.clientY + 'px');
        });
    </script>
</body>
</html>
